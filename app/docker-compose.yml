services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: parkshare
      POSTGRES_PASSWORD: P4rk$hare_2026!
      POSTGRES_DB: parkshare
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parkshare"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://parkshare:P4rk$hare_2026!@db:5432/parkshare?schema=public"
    volumes:
      - ../data:/data:ro
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
