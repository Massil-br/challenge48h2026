# =============================================================================
# Docker Compose STANDALONE — Déploiement autonome avec données intégrées
# =============================================================================
# Utiliser cette configuration pour un déploiement sans dépendance externe.
# L'image contient les données CSV, pas besoin de monter de volume.
#
# Usage:
#   1. Copier .env.example vers .env et configurer POSTGRES_PASSWORD
#   2. docker compose -f docker-compose.standalone.yml up -d --build
#   3. curl -X POST http://localhost:3000/api/seed
# =============================================================================

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parkshare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Définir POSTGRES_PASSWORD dans .env}
      POSTGRES_DB: ${POSTGRES_DB:-parkshare}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parkshare}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: ..
      dockerfile: app/Dockerfile.standalone
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-parkshare}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-parkshare}?schema=public"
      DATA_CSV_PATH: "/data/output/kpis_par_commune.csv"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
