services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-parkshare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-P4rkShare2026}
      POSTGRES_DB: ${POSTGRES_DB:-parkshare}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-parkshare}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: ../app
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-parkshare}:${POSTGRES_PASSWORD:-P4rkShare2026}@db:5432/${POSTGRES_DB:-parkshare}?schema=public"
    volumes:
      - ../data:/data:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - internal
      - external

volumes:
  pgdata:

networks:
  internal:
    driver: bridge
  external:
    driver: bridge
